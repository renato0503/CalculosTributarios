<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Aluno - Cálculos Tributários</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/layout.css">
</head>
<body class="login-page">
    <main class="login-container">
        <header class="login-header">
            <h1>Cálculos Tributários</h1>
            <p id="statusText">Carregando...</p>
        </header>

        <section id="profileSection" class="login-form" style="display: none;">
            <form id="profileForm">
                <div class="form-group">
                    <label for="alunoNome">Nome Completo:</label>
                    <input type="text" id="alunoNome" name="nome" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="alunoWhatsapp">WhatsApp:</label>
                    <input type="tel" id="alunoWhatsapp" name="whatsapp" placeholder="Apenas números" required>
                </div>

                <button type="submit" id="saveProfileBtn" class="btn btn-primary">
                    Continuar
                </button>
            </form>

            <div id="loadingSpinner" class="spinner hidden">
                <div class="spinner-border"></div>
                <p>Salvando...</p>
            </div>

            <div id="profileError" class="alert alert-error hidden"></div>
        </section>
    </main>

    <script type="module" src="src/js/firebase-config.js"></script>
    <script type="module" src="src/js/profile-setup.js"></script>
</body>
</html>
